name: Build Phoenix APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔧 Build APK
        run: flutter build apk --release

      - name: 📂 Debug - Show generated files
        run: |
          echo "=== Listing all APK files ==="
          find build -name "*.apk" -type f || echo "No APK found"
          echo "=== Checking flutter-apk directory ==="
          ls -la build/app/outputs/flutter-apk/ || echo "Directory not found"
          echo "=== Checking apk directory ==="
          ls -la build/app/outputs/apk/ || echo "Directory not found"

      - name: ⬆️ Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30