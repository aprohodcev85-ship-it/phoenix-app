name: Build Phoenix APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - run: flutter pub get

      - run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleRelease --no-daemon --no-parallel && cd ..

      - name: Find ALL APK files
        run: find . -name "*.apk" -type f

      - uses: actions/upload-artifact@v4
        with:
          name: phoenix-apk
          path: |
            ./**/app-release.apk
          retention-days: 30
          if-no-files-found: warn