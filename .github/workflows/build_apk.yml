name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # Фиксируем версию

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔨 Clean Build
        run: flutter clean

      - name: 🔧 Build APK
        run: flutter build apk --release --no-tree-shake-icons