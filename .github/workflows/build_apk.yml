name: Build Phoenix APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        
      - name: 🧹 Clean Everything
        run: |
          rm -rf android/.gradle
          rm -rf build/
          rm -rf ~/.pub-cache/hosted/pub.dartlang.org
      
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 🎯 Setup Flutter Stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          architecture: x64
      
      - name: 🔧 Install Dependencies
        run: flutter pub get
      
      - name: 🧼 Clean Project
        run: flutter clean
      
      - name: 🔨 Build Release APK
        run: flutter build apk --release --verbose
      
      - name: 📂 List All APK Files
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" 2>/dev/null || true
          echo "=== Build Directory Contents ==="
          ls -laR build/app/outputs/ 2>/dev/null || echo "Build directory not found!"
          echo "=== APK Outputs ==="
          ls -laR build/app/outputs/apk/ 2>/dev/null || echo "APK outputs not found!"
      
      - name: ⬆️ Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-apk
          # Проверяем все возможные пути
          path: |
            build/app/outputs/apk/release/*.apk
            build/app/outputs/flutter-apk/*.apk
          retention-days: 30
          if-no-files-found: warn