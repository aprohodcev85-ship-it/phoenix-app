name: Build Phoenix APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # Используем стабильную версию Flutter 3.19.6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
      
      - run: flutter pub get
      
      # Собираем через Gradle напрямую, минуя Flutter wrapper
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --no-parallel
          cd ..
      
      - name: Find APK
        run: |
          echo "=== Searching for APK ==="
          find . -name "app-release.apk" -type f
          ls -la build/app/outputs/apk/release/ 2>/dev/null || echo "Not found in standard path"
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "Not found in flutter-apk path"
      
      - uses: actions/upload-artifact@v4
        with:
          name: phoenix-apk
          path: build/app/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: warn